name: budget_buddy
description: AI 스마트 가계부 - 사회초년생을 위한 금융 관리 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 상태 관리
  provider: 6.1.5+1
  
  # 로컬 스토리지
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  
  # UI 컴포넌트
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  
  # 날짜/시간
  intl: ^0.19.0
  
  # 아이콘
  font_awesome_flutter: ^10.7.0
  
  # HTTP 통신
  http: 1.5.0
  
  # AdMob 광고 (수익화)
  google_mobile_ads: 5.3.1
  
  # 로컬 알림
  flutter_local_notifications: ^18.0.0
  
  # 이미지 선택 (영수증 OCR용)
  image_picker: ^1.1.2

  # 공유 / URL 실행
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  path_provider: ^2.1.5

  # 스플래시 스크린
  flutter_native_splash: ^2.4.3

  # 유틸
  uuid: ^4.5.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1565C0"
  image: assets/icon/app_icon.png
  android_12:
    color: "#1565C0"
    image: assets/icon/app_icon.png
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/icon/
